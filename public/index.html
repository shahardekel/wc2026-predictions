// Extract algo prediction data for a named team from the live games list
function getTeamAlgoData(teamName) {
  const norm = s => s.toLowerCase().replace(/[^a-z]/g,'');
  const tn = norm(teamName);
  let best = null;
  for (const g of games) {
    const p = g.prediction; if (!p) continue;
    const f = p.factors || {};
    const ad = f.attackDefense || {};
    const gh = norm(g.home), ga = norm(g.away);
    const isHome = gh === tn || gh.startsWith(tn.substring(0,5)) || tn.startsWith(gh.substring(0,5));
    const isAway = ga === tn || ga.startsWith(tn.substring(0,5)) || tn.startsWith(ga.substring(0,5));
    if (!isHome && !isAway) continue;
    const side = isHome ? 'home' : 'away';
    const rec = {
      elo:          f.elo?.[side]          ?? null,
      attack:       isHome ? ad.homeAttack  : ad.awayAttack,
      defense:      isHome ? ad.homeDefense : ad.awayDefense,
      leagueAvg:    ad.leagueAvg           ?? 1.5,
      managerStyle: f.managerStyle?.[side] ?? null,
      yellowCards:  f.yellowCards?.[side]  ?? null,
      restDays:     f.restDays?.[side]     ?? null,
      isKnockout:   f.isKnockout           ?? false,
      penaltyRisk:  f.penaltyRisk          ?? null,
      depth:        f.depth?.[side]        ?? null,
      opponent:     isHome ? g.away        : g.home,
      opponentFlag: isHome ? g.awayFlag    : g.homeFlag,
      status:       g.status,
    };
    if (!best || g.status === 'soon') best = rec;
    if (g.status === 'soon') break;
  }
  return best;
}

function mgrStyleLabel(v) {
  if (v == null) return null;
  if (v >  1.2) return {label:'Very Attacking',color:'var(--org)',icon:'⚡'};
  if (v >  0.4) return {label:'Attacking',      color:'var(--grn)',icon:'↗'};
  if (v > -0.4) return {label:'Balanced',        color:'var(--dim)',icon:'⇌'};
  if (v > -1.2) return {label:'Defensive',       color:'var(--acc)',icon:'↙'};
  return               {label:'Very Defensive',  color:'var(--acc)',icon:'🛡'};
}

function renderTeams(){
  if(filter!=='teams') return;
  const gc=document.getElementById('gc');
  if(!teamsData.length){gc.innerHTML=`<div class="state"><div class="ic">📭</div><h3>No teams available</h3></div>`;return;}
  const cards=teamsData.map(t=>{
    const f=t.form||{};
    const results=[];
    const w=f.pts>=3?(f.pts/3|0):0, d=f.played?f.pts-w*3>0?1:0:0, l=f.played-(w+(d>0?1:0));
    for(let i=0;i<Math.min(f.played||0,5);i++) results.push(i<w?'w':i<w+(d>0?1:0)?'d':'l');
    const dots=results.map(r=>`<div class="tc-dot ${r}"></div>`).join('')||'<span style="font-size:9px;color:var(--mut)">No games</span>';
    const c='#'+(t.color||'253047');
    const algo=getTeamAlgoData(t.name);
    const mgr=mgrStyleLabel(algo?.managerStyle);
    return `<div class="tcard" onclick="selectTeam(${JSON.stringify(t).replace(/"/g,'&quot;')})">
      <div class="tc-stripe" style="background:${c}"></div>
      <div class="tc-flag">${t.flag}</div>
      <div class="tc-name">${t.name}</div>
      <div class="tc-rank">FIFA #${t.fifaRank}</div>
      <div class="tc-form">${dots}</div>
      ${algo ? `<div style="display:flex;gap:4px;margin-top:5px;justify-content:center;flex-wrap:wrap">
        ${algo.elo ? `<span style="font-size:9px;color:var(--acc);background:rgba(59,130,246,.13);border-radius:4px;padding:1px 5px">Elo ${algo.elo}</span>` : ''}
        ${algo.attack!=null ? `<span style="font-size:9px;color:var(--org);background:rgba(249,115,22,.13);border-radius:4px;padding:1px 5px">Atk ${algo.attack.toFixed(2)}</span>` : ''}
        ${mgr ? `<span style="font-size:9px;color:${mgr.color};background:rgba(255,255,255,.06);border-radius:4px;padding:1px 5px">${mgr.icon} ${mgr.label}</span>` : ''}
      </div>` : ''}
    </div>`;
  }).join('');
  gc.innerHTML=`<div style="margin-bottom:14px"><span style="font-size:11px;color:var(--mut)">All 48 World Cup teams · Click to view stats & squad</span></div><div class="team-grid">${cards}</div>`;
}

function buildFormationSVG(players, formation, teamColor) {
  const rows = formation.split('-').map(Number);
  const allRows = [1, ...rows];
  const color = '#' + (teamColor || '3b82f6');

  // Group by position, sorted by appearances desc
  const byPos = { G:[], D:[], M:[], F:[] };
  (players||[]).forEach(p => { const k = p.position in byPos ? p.position : 'F'; byPos[k].push(p); });
  Object.keys(byPos).forEach(k => byPos[k].sort((a,b) => b.appearances - a.appearances));
  const posKeys = ['G','D','M','F'];
  const posIdx = { G:0, D:0, M:0, F:0 };

  // Assign players to formation rows
  const assigned = allRows.map((count, rowIdx) => {
    const key = posKeys[rowIdx] || 'F';
    return Array.from({length: count}, () => { const arr = byPos[key]; return arr[posIdx[key]++] || null; });
  });

  const W = 236, H = 340;
  // y positions: GK near bottom, FWD near top
  const rowYs = allRows.map((_, i) => H - 30 - i * ((H - 55) / (allRows.length - 1)));

  const pitchBands = [0,1,2,3,4,5,6].map(i =>
    `<rect x="0" y="${i * H/7}" width="${W}" height="${H/7}" fill="${i%2===0?'#1a3d1a':'#1e441e'}"/>`
  ).join('');

  let nodes = '';
  assigned.forEach((rowPlayers, rowIdx) => {
    const y = rowYs[rowIdx];
    const n = rowPlayers.length;
    rowPlayers.forEach((player, colIdx) => {
      const x = n === 1 ? W/2 : 18 + colIdx * ((W - 36) / (n - 1));
      if (!player) return;
      const hasGoal = player.goals > 0;
      const hasAssist = player.assists > 0;
      const shortName = (player.shortName || player.name || '').split(' ').pop().substring(0, 9);
      const ring = hasGoal ? `stroke="#f97316" stroke-width="2.5"` : `stroke="rgba(255,255,255,0.25)" stroke-width="1"`;
      nodes += `<g data-pid="${player.id}" style="cursor:pointer">
        <circle cx="${x}" cy="${y}" r="15" fill="${color}" fill-opacity="0.9" ${ring}/>
        <text x="${x}" y="${y+4}" text-anchor="middle" dominant-baseline="middle" font-size="10" font-weight="700" fill="white" pointer-events="none">${player.jersey||''}</text>
        ${hasGoal ? `<circle cx="${x+11}" cy="${y-11}" r="7" fill="#f97316" pointer-events="none"/><text x="${x+11}" y="${y-11}" text-anchor="middle" dominant-baseline="middle" font-size="7" font-weight="800" fill="white" pointer-events="none">${player.goals}</text>` : ''}
        ${!hasGoal && hasAssist ? `<circle cx="${x+11}" cy="${y-11}" r="6" fill="#3b82f6" pointer-events="none"/><text x="${x+11}" y="${y-11}" text-anchor="middle" dominant-baseline="middle" font-size="7" font-weight="800" fill="white" pointer-events="none">A</text>` : ''}
        <text x="${x}" y="${y+26}" text-anchor="middle" font-size="7.5" fill="rgba(255,255,255,0.8)" font-weight="500" pointer-events="none">${shortName}</text>
      </g>`;
    });
  });

  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;display:block;">
    <rect width="${W}" height="${H}" fill="#1a3d1a" rx="6"/>
    ${pitchBands}
    <rect x="8" y="8" width="${W-16}" height="${H-16}" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1" rx="3"/>
    <line x1="8" y1="${H/2}" x2="${W-8}" y2="${H/2}" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <circle cx="${W/2}" cy="${H/2}" r="28" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <rect x="${W/2-42}" y="8" width="84" height="46" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <rect x="${W/2-24}" y="8" width="48" height="20" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <rect x="${W/2-42}" y="${H-54}" width="84" height="46" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <rect x="${W/2-24}" y="${H-28}" width="48" height="20" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    ${nodes}
  </svg>`;
}

function buildCharts(form, roster) {
  const f = form || {};
  const players = roster?.players || [];

  // ── Shot funnel ──
  const shots = players.reduce((s,p) => s + p.shots, 0);
  const sot   = players.reduce((s,p) => s + p.shotsOnTarget, 0);
  const goals = players.reduce((s,p) => s + p.goals, 0);
  const maxShots = shots || 1;
  const funnelRow = (label, val, pct, color) =>
    `<div class="funnel-row">
      <span class="funnel-label">${label}</span>
      <div class="funnel-track"><div class="funnel-fill" style="width:${pct}%;background:${color}"></div></div>
      <span class="funnel-val" style="color:${color}">${val}</span>
      <span class="funnel-pct">${shots>0?Math.round(val/shots*100)+'%':''}</span>
    </div>`;
  const shotChart = `<div class="td-chart">
    <div class="td-chart-title">🎯 Shot Quality</div>
    ${funnelRow('Total Shots', shots, 100, 'var(--dim)')}
    ${funnelRow('On Target', sot, Math.round(sot/maxShots*100), 'var(--acc)')}
    ${funnelRow('Goals', goals, Math.round(goals/maxShots*100), 'var(--grn)')}
    <div style="font-size:10px;color:var(--mut);margin-top:6px">
      Accuracy: <strong style="color:var(--acc)">${shots>0?Math.round(sot/shots*100):0}%</strong> on target &nbsp;·&nbsp;
      Conversion: <strong style="color:var(--grn)">${sot>0?Math.round(goals/sot*100):0}%</strong> of SoT
    </div>
  </div>`;

  // ── Top scorers ──
  const scorers = players.filter(p => p.goals > 0).slice(0, 5);
  const maxG = scorers[0]?.goals || 1;
  const scorerRows = scorers.length
    ? scorers.map(p =>
        `<div class="scorer-row">
          <span class="scorer-name">${p.shortName||p.name}</span>
          <div class="scorer-track"><div class="scorer-fill" style="width:${Math.round(p.goals/maxG*100)}%"></div></div>
          <span class="scorer-val">${p.goals}</span>
        </div>`
      ).join('')
    : `<div style="font-size:11px;color:var(--mut);padding:6px 0">No goals scored yet</div>`;
  const scorerChart = `<div class="td-chart">
    <div class="td-chart-title">⚽ Top Scorers</div>
    ${scorerRows}
    ${players.filter(p=>p.assists>0).length ? '<div style="margin-top:8px;border-top:1px solid var(--bor);padding-top:8px"><div style="font-size:10px;color:var(--mut);margin-bottom:6px">ASSISTS</div>' +
      players.filter(p=>p.assists>0).slice(0,3).map(p=>
        `<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
          <span style="font-size:11px;color:var(--dim);width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.shortName||p.name}</span>
          <div style="flex:1;height:6px;background:var(--bor);border-radius:3px;overflow:hidden"><div style="height:100%;background:var(--acc);width:${Math.round(p.assists/(players[0]?.assists||1)*100)}%"></div></div>
          <span style="font-size:11px;font-weight:800;color:var(--acc);width:16px;text-align:right">${p.assists}</span>
        </div>`).join('')
    + '</div>' : ''}
  </div>`;

  // ── Discipline ──
  const booked = players.filter(p => p.yellowCards > 0 || p.redCards > 0)
    .sort((a,b) => (b.yellowCards+b.redCards*3)-(a.yellowCards+a.redCards*3)).slice(0,5);
  const totalYC = players.reduce((s,p)=>s+p.yellowCards,0);
  const totalRC = players.reduce((s,p)=>s+p.redCards,0);
  const disciplineRows = booked.length
    ? booked.map(p =>
        `<div class="card-row">
          <span class="card-name">${p.shortName||p.name}</span>
          <div class="card-chips">
            ${p.yellowCards>0?`<span class="yc">🟨 ${p.yellowCards}</span>`:''}
            ${p.redCards>0?`<span class="rc">🟥 ${p.redCards}</span>`:''}
          </div>
        </div>`).join('')
    : `<div style="font-size:11px;color:var(--mut);padding:6px 0">No cards yet</div>`;
  const disciplineChart = `<div class="td-chart">
    <div class="td-chart-title">🟨 Discipline &nbsp;<span style="font-weight:400;color:var(--mut)">${totalYC} yellows · ${totalRC} reds</span></div>
    ${disciplineRows}
  </div>`;

  // ── W/D/L results bar ──
  const gp = f.played||0, pts = f.pts||0;
  const w = Math.floor(pts/3), dr = pts-w*3>0?1:0, l = gp-w-dr;
  const resultChart = gp>0 ? `<div class="td-chart">
    <div class="td-chart-title">📊 Tournament Results</div>
    <div style="display:flex;height:14px;border-radius:7px;overflow:hidden;margin-bottom:8px">
      ${w>0?`<div style="flex:${w};background:var(--grn)" title="${w} wins"></div>`:''}
      ${dr>0?`<div style="flex:${dr};background:var(--gld)" title="${dr} draws"></div>`:''}
      ${l>0?`<div style="flex:${l};background:var(--red)" title="${l} losses"></div>`:''}
    </div>
    <div style="display:flex;gap:12px;font-size:11px">
      <span style="color:var(--grn)">● ${w} Win${w!==1?'s':''}</span>
      <span style="color:var(--gld)">● ${dr} Draw${dr!==1?'s':''}</span>
      <span style="color:var(--red)">● ${l} Loss${l!==1?'es':''}</span>
      <span style="color:var(--mut);margin-left:auto">${(pts/Math.max(gp*3,1)*100|0)}% pts rate</span>
    </div>
  </div>` : '';

  return `<div class="td-charts-col">${shotChart}${scorerChart}${disciplineChart}${resultChart}</div>`;
}

function renderTeamDetail(){
  if(filter!=='teams'||!selectedTeam) return;
  const gc=document.getElementById('gc');
  const t=selectedTeam;
  const f=t.form||{};
  const c='#'+(t.color||'253047');

  // WC stats from form
  const gp=f.played||0, pts=f.pts||0, gf=f.gf||0, ga=f.ga||0, gd=gf-ga;
  const w=pts>=3?Math.floor(pts/3):0;
  const remaining=pts-w*3;
  const d_=remaining===1?1:0;
  const l_=gp-w-d_;

  const statBox=(val,lbl,col='var(--text)')=>
    `<div class="td-stat"><div class="sv" style="color:${col}">${val}</div><div class="sl">${lbl}</div></div>`;

  let playerHTML='<div style="color:var(--mut);font-size:12px;padding:20px 0">Loading squad…</div>';
  if(teamRoster){
    const players=teamRoster.players||[];
    const posMap={'G':'GK','D':'DEF','M':'MID','F':'FWD'};
    const posFilters=['all','F','M','D','G'];
    const posLabels={'all':'All','F':'FWD','M':'MID','D':'DEF','G':'GK'};
    const posFilterBtns=posFilters.map(p=>
      `<button class="fb ${playerPosFilter===p?'active':''}" style="padding:3px 10px;font-size:10px" onclick="playerPosFilter='${p}';renderTeamDetail()">${posLabels[p]}</button>`
    ).join('');

    const filtered=players.filter(p=>playerPosFilter==='all'||p.position===playerPosFilter);
    const isGK=playerPosFilter==='G';

    const rows=filtered.map(p=>{
      const posCls='pos-'+(p.position||'');
      const posLabel=posMap[p.position]||p.position||'?';
      if(isGK){
        return `<tr data-pid="${p.id}">
          <td><span style="font-size:14px;margin-right:6px">#${p.jersey}</span></td>
          <td style="font-weight:600">${p.name}</td>
          <td><span class="pos-badge ${posCls}">${posLabel}</span></td>
          <td class="rc">${p.appearances}</td>
          <td class="rc" style="color:var(--grn);font-weight:700">${p.saves}</td>
          <td class="rc" style="color:var(--red)">${p.goalsConceded}</td>
          <td class="rc" style="color:var(--gld)">${p.yellowCards}</td>
          <td class="rc" style="color:var(--red)">${p.redCards||'-'}</td>
        </tr>`;
      }
      return `<tr data-pid="${p.id}">
        <td><span style="font-size:14px;margin-right:6px">#${p.jersey}</span></td>
        <td style="font-weight:600">${p.name}</td>
        <td><span class="pos-badge ${posCls}">${posLabel}</span></td>
        <td class="rc">${p.appearances}</td>
        <td class="rc"><span class="${p.goals>0?'goal-num':''}">${p.goals||'-'}</span></td>
        <td class="rc" style="color:var(--acc)">${p.assists||'-'}</td>
        <td class="rc">${p.shotsOnTarget||'-'}</td>
        <td class="rc" style="color:var(--gld)">${p.yellowCards||'-'}</td>
        <td class="rc" style="color:var(--red)">${p.redCards||'-'}</td>
      </tr>`;
    }).join('');

    const hdr=isGK
      ?`<tr><th>#</th><th>Player</th><th>Pos</th><th class="rc">Apps</th><th class="rc">Saves</th><th class="rc">GA</th><th class="rc">YC</th><th class="rc">RC</th></tr>`
      :`<tr><th>#</th><th>Player</th><th>Pos</th><th class="rc">Apps</th><th class="rc">G</th><th class="rc">A</th><th class="rc">SoT</th><th class="rc">YC</th><th class="rc">RC</th></tr>`;

    playerHTML=`
      <div class="player-pos-filter">${posFilterBtns}</div>
      <table class="player-table"><thead>${hdr}</thead><tbody>${rows||'<tr><td colspan="9" style="color:var(--mut);text-align:center;padding:16px">No players</td></tr>'}</tbody></table>`;
  }

  gc.innerHTML=`
    <div class="td-back" onclick="selectedTeam=null;renderTeams()">← Back to all teams</div>
    <div class="td-header">
      <div class="td-flag">${t.flag}</div>
      <div class="td-info">
        <div class="td-name">${t.name}</div>
        <div class="td-meta">
          <span class="td-badge td-rank">FIFA #${t.fifaRank}</span>
          <span class="td-badge td-formation">⬡ ${t.formation}</span>
          <span class="td-badge">${t.abbreviation}</span>
          ${gp>0?`<span class="td-badge" style="background:var(--grn-g);border-color:rgba(34,197,94,.3);color:var(--grn)">${pts} pts · ${gp} games</span>`:''}
        </div>
      </div>
      ${teamRoster?`<div style="text-align:right">
        <div style="font-size:28px;font-weight:800;color:var(--org)">${teamRoster.teamGoals}</div>
        <div style="font-size:9px;color:var(--mut);text-transform:uppercase">Goals scored</div>
      </div>`:''}
    </div>
    <div class="td-stats">
      ${statBox(gp,'Played')}
      ${statBox(w,'Wins','var(--grn)')}
      ${statBox(d_,'Draws','var(--gld)')}
      ${statBox(l_,'Losses','var(--red)')}
      ${statBox(gf,'GF','var(--grn)')}
      ${statBox(ga,'GA','var(--red)')}
      ${statBox((gd>0?'+':'')+gd,'GD',gd>0?'var(--grn)':gd<0?'var(--red)':'var(--dim)')}
      ${statBox(pts,'Points','var(--acc)')}
      ${teamRoster?statBox(teamRoster.teamAssists,'Assists','var(--acc)'):''}
      ${teamRoster?statBox(teamRoster.teamShotsOnTarget,'SoT','var(--dim)'):''}
    </div>
    ${(()=>{
      const algo=getTeamAlgoData(t.name);
      if(!algo) return '';
      const avg=algo.leagueAvg||1.5;
      const atkPct=Math.min(100,Math.round((algo.attack||0)/Math.max(avg*2.5,1)*100));
      const defPct=algo.defense!=null?Math.max(0,Math.round((1-((algo.defense-avg*.25)/(avg*1.5)))*100)):null;
      const mgr=mgrStyleLabel(algo.managerStyle);
      const yc=algo.yellowCards??0;
      const ycColor=yc>=5?'var(--red)':yc>=3?'var(--gld)':'var(--grn)';
      const bar=(pct,color,w='100%')=>`<div style="height:6px;border-radius:3px;background:var(--bor);overflow:hidden;width:${w}"><div style="height:100%;width:${pct}%;background:${color};border-radius:3px;transition:width .4s"></div></div>`;
      const nextGame=algo.status==='soon'?`<span style="font-size:10px;color:var(--mut)">Next: ${algo.opponentFlag||''} ${algo.opponent}</span>`:'';
      return `<div class="td-section">🤖 AI Model Factors</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:18px">

        <div class="td-chart" style="margin:0">
          <div class="td-chart-title">⚡ Bayesian Elo Rating</div>
          ${algo.elo ? `
          <div style="font-size:26px;font-weight:800;color:var(--acc);margin:4px 0">${algo.elo}</div>
          ${bar(Math.min(100,Math.round((algo.elo-1600)/4.5)),'var(--acc)')}
          <div style="font-size:9px;color:var(--mut);margin-top:5px">Range 1600–2050 · Updated after each WC result${nextGame?'&nbsp;·&nbsp;'+nextGame.replace(/<[^>]*>/g,''):''}</div>
          ` : '<div style="color:var(--mut);font-size:11px">No upcoming game</div>'}
        </div>

        <div class="td-chart" style="margin:0">
          <div class="td-chart-title">🎯 xG Strength (Bayesian)</div>
          ${algo.attack!=null ? `
          <div style="display:flex;flex-direction:column;gap:7px;margin-top:4px">
            <div>
              <div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:3px"><span style="color:var(--mut)">Attack</span><span style="color:var(--org);font-weight:700">${algo.attack.toFixed(2)} <span style="color:var(--mut);font-weight:400">vs avg ${avg.toFixed(2)}</span></span></div>
              ${bar(atkPct,'var(--org)')}
            </div>
            ${defPct!=null?`<div>
              <div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:3px"><span style="color:var(--mut)">Defense</span><span style="color:${algo.defense<avg?'var(--grn)':'var(--red)'};font-weight:700">${algo.defense.toFixed(2)} conceded <span style="color:var(--mut);font-weight:400">(${algo.defense<avg?'solid':'leaky'})</span></span></div>
              ${bar(defPct,algo.defense<avg?'var(--grn)':'var(--red)')}
            </div>`:''}
          </div>
          <div style="font-size:9px;color:var(--mut);margin-top:6px">λ inputs to Dixon-Coles Poisson model · ${algo.attack>avg*1.5?'Elite attack':algo.attack>avg?'Above avg attack':'Below avg attack'}</div>
          ` : '<div style="color:var(--mut);font-size:11px">No data</div>'}
        </div>

        <div class="td-chart" style="margin:0">
          <div class="td-chart-title">🧠 Manager Style</div>
          ${mgr ? `
          <div style="font-size:20px;font-weight:800;color:${mgr.color};margin:6px 0">${mgr.icon} ${mgr.label}</div>
          <div style="font-size:10px;color:var(--mut)">Style score: <strong style="color:${mgr.color}">${algo.managerStyle>0?'+':''}${algo.managerStyle?.toFixed(1)}</strong> &nbsp;·&nbsp; ${algo.managerStyle>0.4?'boosts λ (more goals expected)':algo.managerStyle<-0.4?'reduces λ (fewer goals expected)':'neutral impact on λ'}</div>
          <div style="font-size:9px;color:var(--mut);margin-top:4px">Derived from tournament shot rate vs formation</div>
          ` : '<div style="color:var(--mut);font-size:11px">No data</div>'}
        </div>

        <div class="td-chart" style="margin:0">
          <div class="td-chart-title">🟨 Discipline Risk</div>
          <div style="font-size:26px;font-weight:800;color:${yc>=5?'var(--red)':yc>=3?'var(--gld)':'var(--grn)'};margin:4px 0">${yc} <span style="font-size:12px;font-weight:400">yellow${yc!==1?'s':''}</span></div>
          <div style="font-size:10px;color:var(--mut)">${yc>=5?'⚠️ Suspension risk — −3% λ applied':yc>=3?'⚠️ Caution — approaching suspension threshold':'✓ Clean — no λ penalty'}</div>
          ${algo.restDays!=null?`<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--bor);font-size:10px;color:var(--mut)">😴 Rest: <strong style="color:${algo.restDays<3?'var(--red)':algo.restDays<5?'var(--gld)':'var(--grn)'}">${algo.restDays}d</strong> ${algo.restDays<3?'⚠️ Fatigue risk':algo.restDays>=5?'✓ Fresh':''}</div>`:''}
          ${(()=>{const pr=algo.isKnockout&&algo.penaltyRisk;if(!pr)return '';const v=typeof pr==='object'?(pr.home??pr.away):pr;return v!=null?`<div style="margin-top:6px;font-size:10px;color:var(--acc)">🎯 Penalty history: <strong>${v}%</strong> shootout win rate (knockout)</div>`:''})()}
        </div>

        ${algo.depth!=null?`<div class="td-chart" style="margin:0">
          <div class="td-chart-title">👥 Squad Depth Score</div>
          <div style="font-size:26px;font-weight:800;color:var(--dim);margin:4px 0">${algo.depth.toFixed(1)}</div>
          ${bar(Math.min(100,Math.round(algo.depth/12*100)),'var(--dim)')}
          <div style="font-size:9px;color:var(--mut);margin-top:5px">Weighted by roster size, avg appearances & positional coverage</div>
        </div>`:''}

      </div>`;
    })()}
    <div class="td-section">Formation & Analytics</div>
    <div class="td-viz">
      <div class="td-pitch-wrap">
        <div class="td-pitch-label">${t.formation} · Likely XI</div>
        ${teamRoster ? buildFormationSVG(teamRoster.players, t.formation, t.color) : '<div style="color:var(--mut);font-size:11px;text-align:center;padding:20px">Loading…</div>'}
        <div style="font-size:9px;color:var(--mut);text-align:center;margin-top:8px">🟠 = goal scorer &nbsp;·&nbsp; 🔵 = assist</div>
      </div>
      ${teamRoster ? buildCharts(t.form, teamRoster) : '<div class="td-charts-col"><div class="td-chart" style="color:var(--mut);font-size:11px">Loading stats…</div></div>'}
    </div>
    <div class="td-section">Squad & Player Stats</div>
    ${playerHTML}
  `;
}

// algoOverride: when navigating from a game card, lock the heatmap to the
// exact λ values the predictor used (after O/U scaling + handicap adjustment)
// plus the final blended win probabilities. Cleared when user picks new teams.
let algoOverride = null;

async function goToAlgo(home, away, lH, lA, finalHome, finalDraw, finalAway, suspHome=0, suspAway=0, xgSource='proxy') {
  // Look up extra contextual factors stored by the game-card renderer
  const extraFactors = (window._gameFactorsMap || {})[`${home}|${away}`] || null;
  // Store the exact λ and blended probs from the prediction card
  algoOverride = (lH && lA) ? { lH, lA, finalHome, finalDraw, finalAway, home, away, suspHome, suspAway, xgSource, extraFactors } : null;

  // Switch to Algorithm tab
  const btn = [...document.querySelectorAll('.fb')].find(b => b.textContent.includes('Algorithm'));
  if (btn) { filter='algo'; document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); }
  // Render the algo tab (loads data if needed)
  await renderAlgo();
  // Scroll heatmap section into view
  document.querySelector('.algo-section:nth-child(2)')?.scrollIntoView({behavior:'smooth',block:'start'});
  // Set the heatmap dropdowns to the match teams
  const normStr = s => s.toLowerCase().replace(/[^a-z ]/g,'').replace(/\s+/g,' ').trim();
  const hmHome = document.getElementById('hm-home');
  const hmAway = document.getElementById('hm-away');
  if (!hmHome || !hmAway) return;
  const hn = normStr(home), an = normStr(away);
  for (const opt of hmHome.options) {
    if (opt.value === hn || normStr(opt.value).includes(hn.split(' ')[0])) { hmHome.value = opt.value; break; }
  }
  for (const opt of hmAway.options) {
    if (opt.value === an || normStr(opt.value).includes(an.split(' ')[0])) { hmAway.value = opt.value; break; }
  }
  updateHeatmap();
}

async function goToTeam(teamName) {
  // Switch to Teams tab
  const btn = [...document.querySelectorAll('.fb')].find(b => b.textContent.includes('Teams'));
  if (btn) { filter='teams'; document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); }
  // Load teams list if needed
  if (!teamsData.length) {
    const gc = document.getElementById('gc');
    gc.innerHTML = `<div class="state"><div class="ic">👥</div><h3>Loading…</h3></div>`;
    const r = await fetch('/api/teams');
    const j = await r.json();
    teamsData = j.teams || [];
  }
  // Find matching team (normalize name)
  const norm = s => s.toLowerCase().replace(/[^a-z]/g,'');
  const team = teamsData.find(t => norm(t.name) === norm(teamName))
             || teamsData.find(t => norm(t.name).includes(norm(teamName)) || norm(teamName).includes(norm(t.name)));
  if (team) selectTeam(team);
  else renderTeams();
}

function scrollToCard(id){
  closeSidebar();
  // If current filter hides this card, switch to 'soon' first
  const el=document.getElementById(id);
  if(!el){
    const btn=document.querySelector('.fb[onclick*="soon"]');
    setF('soon',btn);
    requestAnimationFrame(()=>{
      const el2=document.getElementById(id);
      if(el2) el2.scrollIntoView({behavior:'smooth',block:'center'});
    });
    return;
  }
  el.scrollIntoView({behavior:'smooth',block:'center'});
  el.style.outline='2px solid var(--acc)';
  setTimeout(()=>el.style.outline='',1200);
}
