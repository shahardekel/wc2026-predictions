<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>⚽ WC 2026 AI Predictions</title>
  <style>
    :root{--bg:#0a0e1a;--sur:#131929;--sur2:#1a2235;--bor:#253047;--text:#e8edf5;--dim:#8a9bbf;--mut:#4a5a7a;--acc:#3b82f6;--acc-g:rgba(59,130,246,0.15);--grn:#22c55e;--grn-g:rgba(34,197,94,0.1);--org:#f97316;--red:#ef4444;--red-g:rgba(239,68,68,0.1);--gld:#fbbf24;--gld-g:rgba(251,191,36,0.12);--liv:#ff4444;--liv-g:rgba(255,68,68,0.1);--pur:#a855f7;--pur-g:rgba(168,85,247,0.12);}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;min-height:100vh;}
    header{background:linear-gradient(135deg,#0d1b2e,#1a2d4a);border-bottom:1px solid var(--bor);padding:14px 22px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
    .hdr-l{display:flex;align-items:center;gap:12px;}
    .ttl h1{font-size:17px;font-weight:700;background:linear-gradient(135deg,#e8edf5,#93c5fd);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .ttl p{font-size:10px;color:var(--mut);margin-top:2px;}
    .hdr-r{display:flex;align-items:center;gap:8px;}
    .pill{display:flex;align-items:center;gap:5px;background:var(--sur2);border:1px solid var(--bor);border-radius:20px;padding:4px 11px;font-size:11px;color:var(--dim);}
    .dot{width:7px;height:7px;border-radius:50%;background:var(--mut);}
    .dot.ok{background:var(--grn);}
    .rbtn{background:var(--acc);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:4px;}
    .rbtn:hover{background:#2563eb;}
    .rbtn.spin .si{animation:spin .7s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .layout{display:grid;grid-template-columns:clamp(200px,18vw,300px) 1fr;gap:0;max-width:1600px;margin:0 auto;}
    .sidebar{position:sticky;top:57px;height:calc(100vh - 57px);overflow-y:auto;border-right:1px solid var(--bor);padding:12px 0;}
    .sb-title{font-size:clamp(9px,1vw,12px);font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.08em;padding:0 clamp(8px,1.2vw,16px) 10px;}
    .sb-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:clamp(2px,.4vw,6px);padding:clamp(6px,.7vw,10px) clamp(8px,1.2vw,16px);border-bottom:1px solid rgba(37,48,71,.5);transition:background .15s;cursor:pointer;}
    .sb-row:hover{background:var(--sur);}
    .sb-home{display:flex;align-items:center;gap:clamp(3px,.4vw,6px);overflow:hidden;}
    .sb-away{display:flex;align-items:center;justify-content:flex-end;gap:clamp(3px,.4vw,6px);overflow:hidden;}
    .sb-flag{font-size:clamp(13px,1.4vw,18px);flex-shrink:0;}
    .sb-name{font-size:clamp(10px,1vw,13px);color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .sb-sc{display:flex;align-items:center;gap:clamp(2px,.3vw,5px);flex-shrink:0;}
    .sb-num{font-size:clamp(13px,1.3vw,17px);font-weight:800;line-height:1;}
    .sb-num.w{color:var(--grn);}
    .sb-num.d{color:var(--gld);}
    .sb-num.l{color:var(--red);}
    .sb-dash{font-size:clamp(9px,.9vw,12px);color:var(--mut);}
    main{padding:20px 16px;min-width:0;}
    .sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:199;backdrop-filter:blur(2px);}
    .sb-overlay.open{display:block;}
    .sb-close{display:none;position:absolute;top:12px;right:12px;background:var(--sur2);border:1px solid var(--bor);color:var(--dim);border-radius:8px;padding:4px 10px;font-size:13px;cursor:pointer;z-index:1;}
    .hbg{display:none;background:var(--sur2);border:1px solid var(--bor);color:var(--text);border-radius:8px;padding:6px 10px;font-size:16px;cursor:pointer;line-height:1;}
    @media(max-width:800px){
      .layout{grid-template-columns:1fr;}
      .sidebar{display:none;position:fixed;top:0;left:0;height:100vh;width:82vw;max-width:320px;z-index:200;background:var(--bg);border-right:1px solid var(--bor);transform:translateX(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1);padding-top:50px;}
      .sidebar.open{display:block;transform:translateX(0);}
      .sb-close{display:block;}
      .hbg{display:block;}
    }
    .filters{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;align-items:center;}
    .fb{background:var(--sur);border:1px solid var(--bor);color:var(--dim);border-radius:20px;padding:5px 13px;font-size:11px;cursor:pointer;transition:all .2s;}
    .fb.active{background:var(--acc-g);border-color:var(--acc);color:var(--acc);font-weight:600;}
    .quota{margin-left:auto;font-size:10px;color:var(--mut);background:var(--sur);border:1px solid var(--bor);border-radius:8px;padding:4px 9px;}
    .sh{font-size:10px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.08em;margin:18px 0 9px;display:flex;align-items:center;gap:8px;}
    .sh::after{content:'';flex:1;height:1px;background:var(--bor);}

    /* CARD */
    .card{background:var(--sur);border:1px solid var(--bor);border-radius:14px;padding:15px 17px;margin-bottom:10px;transition:all .2s;position:relative;overflow:hidden;}
    .card:hover{border-color:rgba(59,130,246,.35);transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,.3);}
    .card.lc{border-color:rgba(255,68,68,.35);}
    .card.lc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--liv),transparent);animation:sh 2s infinite;}
    @keyframes sh{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}

    /* MATCH ROW */
    .mr{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;margin-bottom:13px;}
    .tm{display:flex;align-items:center;gap:9px;}
    .tm.aw{flex-direction:row-reverse;}
    .tf{font-size:24px;line-height:1;flex-shrink:0;}
    .ti{overflow:hidden;min-width:0;}
    .tn{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .tm.aw .ti{text-align:right;}
    .gs-list{margin-top:3px;display:flex;flex-direction:column;gap:1px;}
    .gs-item{font-size:10px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .gs-item .gs-min{font-size:9px;color:var(--mut);margin-left:3px;}
    .tm.aw .gs-list{align-items:flex-end;}

    /* CENTER BLOCK */
    .vb{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:100px;}
    .vs{font-size:9px;color:var(--mut);font-weight:600;text-transform:uppercase;letter-spacing:.06em;}

    /* AI PREDICTION SCORE */
    .pred{display:flex;flex-direction:column;align-items:center;gap:3px;}
    .pred-nums{display:flex;align-items:center;gap:8px;}
    .pn{font-size:30px;font-weight:800;line-height:1;}
    .pn.w{color:var(--grn);}
    .pn.l{color:var(--red);}
    .pn.d{color:var(--gld);}
    .pdash{font-size:20px;color:var(--mut);font-weight:300;}
    .pred-tag{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:2px 8px;border-radius:10px;background:var(--pur-g);color:var(--pur);}

    /* LIVE / FINAL */
    .live-s{display:flex;flex-direction:column;align-items:center;gap:3px;}
    .ls{display:flex;align-items:center;gap:6px;color:var(--liv);font-size:28px;font-weight:800;}
    .lmin{font-size:10px;color:var(--liv);font-weight:700;background:var(--liv-g);padding:2px 8px;border-radius:10px;animation:pulse 1.5s infinite;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    .fin-s{display:flex;flex-direction:column;align-items:center;gap:3px;}
    .fs{display:flex;align-items:center;gap:8px;}
    .fsn{font-size:28px;font-weight:800;line-height:1;}
    .fsn.w{color:var(--grn);}
    .fsn.l{color:var(--red);}
    .fsn.d{color:var(--gld);}
    .fsd{font-size:18px;color:var(--mut);}
    .fin-tag{font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px;background:var(--gld-g);color:var(--gld);}

    .kt{font-size:13px;font-weight:700;color:var(--dim);}
    .kt.soon{color:var(--gld);}

    /* ODDS */
    .og{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:10px;}
    .ob{background:var(--sur2);border:1px solid var(--bor);border-radius:9px;padding:9px;text-align:center;transition:all .2s;}
    .ob:hover{border-color:rgba(59,130,246,.4);}
    .ob.fav{background:var(--grn-g);border-color:rgba(34,197,94,.3);}
    .ob.dog{background:var(--red-g);border-color:rgba(239,68,68,.2);}
    .oo{font-size:9px;color:var(--mut);font-weight:500;margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em;}
    .od{font-size:19px;font-weight:800;line-height:1;}
    .ob.fav .od{color:var(--grn);}
    .ob.dog .od{color:var(--red);}
    .ob:not(.fav):not(.dog) .od{color:var(--org);}
    .oa{font-size:10px;color:var(--mut);margin-top:2px;}
    .oi{font-size:9px;color:var(--mut);margin-top:1px;}

    /* FACTOR BREAKDOWN */
    .factors{background:var(--sur2);border:1px solid var(--bor);border-radius:10px;padding:11px 13px;margin-top:10px;}
    .factors-title{font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;display:flex;align-items:center;gap:6px;border-radius:6px;padding:2px 4px;margin:-2px -4px 10px;transition:background .15s;}
    .factors-title:hover{background:rgba(96,165,250,.08);}
    .factor-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
    .factor-name{font-size:10px;color:var(--mut);width:88px;flex-shrink:0;}
    .factor-bar{flex:1;height:6px;background:var(--bor);border-radius:3px;overflow:hidden;position:relative;display:flex;}
    .fbar-h{height:100%;background:var(--grn);border-radius:2px 0 0 2px;transition:width .5s;}
    .fbar-a{height:100%;background:var(--acc);border-radius:0 2px 2px 0;transition:width .5s;}
    .factor-vals{display:flex;justify-content:space-between;font-size:9px;color:var(--mut);width:60px;text-align:right;}
    .fw{font-size:9px;color:var(--mut);width:28px;text-align:right;flex-shrink:0;}

    /* PROB BAR */
    .pb{display:flex;align-items:center;gap:7px;margin-bottom:5px;}
    .pbl{font-size:10px;color:var(--mut);width:65px;flex-shrink:0;}
    .pbt{flex:1;height:7px;background:var(--bor);border-radius:4px;overflow:hidden;display:flex;}
    .pbh{height:100%;background:var(--grn);}
    .pbd{height:100%;background:var(--org);}
    .pba{height:100%;background:var(--acc);}
    .pbv{font-size:10px;color:var(--dim);width:28px;text-align:right;font-weight:500;}
    .pb-labs{display:flex;justify-content:space-between;padding:2px 0 0 72px;font-size:9px;color:var(--mut);margin-bottom:8px;}

    /* CONFIDENCE + WEATHER */
    .bottom-row{display:flex;align-items:center;gap:12px;margin-top:8px;flex-wrap:wrap;}
    .conf-block{display:flex;align-items:center;gap:5px;}
    .conf-lbl{font-size:9px;color:var(--mut);}
    .cdots{display:flex;gap:3px;}
    .cdot{width:8px;height:8px;border-radius:50%;background:var(--bor);}
    .cdot.on{background:var(--pur);}
    .conf-txt{font-size:9px;color:var(--pur);font-weight:600;}
    .weather-tag{font-size:9px;background:var(--sur);border:1px solid var(--bor);border-radius:8px;padding:2px 8px;color:var(--dim);}
    .upset-tag{font-size:9px;background:var(--gld-g);border:1px solid rgba(251,191,36,.3);border-radius:8px;padding:2px 8px;color:var(--gld);font-weight:600;}

    /* META */
    .meta{display:flex;align-items:center;justify-content:space-between;margin-top:9px;padding-top:8px;border-top:1px solid var(--bor);}
    .meta-l{display:flex;align-items:center;gap:7px;}
    .stag{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:2px 8px;border-radius:20px;}
    .t-live{background:var(--liv-g);color:var(--liv);}
    .t-soon{background:var(--gld-g);color:var(--gld);}
    .t-up{background:var(--acc-g);color:var(--acc);}
    .t-fin{background:var(--sur2);color:var(--mut);}
    .bk{font-size:10px;color:var(--mut);}

    .state{text-align:center;padding:60px 20px;color:var(--mut);}
    .state .ic{font-size:48px;margin-bottom:16px;}

    /* TEAMS TAB */
    .team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-top:4px;}
    .tcard{background:var(--sur);border:1px solid var(--bor);border-radius:12px;padding:14px 10px;text-align:center;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
    .tcard:hover{border-color:rgba(59,130,246,.5);transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.3);}
    .tcard .tc-stripe{position:absolute;top:0;left:0;right:0;height:3px;}
    .tcard .tc-flag{font-size:28px;margin-bottom:5px;}
    .tcard .tc-name{font-size:11px;font-weight:600;color:var(--text);margin-bottom:3px;line-height:1.3;}
    .tcard .tc-rank{font-size:10px;color:var(--mut);}
    .tcard .tc-form{display:flex;justify-content:center;gap:3px;margin-top:5px;}
    .tcard .tc-dot{width:7px;height:7px;border-radius:50%;}
    .tcard .tc-dot.w{background:var(--grn);}
    .tcard .tc-dot.d{background:var(--gld);}
    .tcard .tc-dot.l{background:var(--red);}
    .tcard .tc-dot.u{background:var(--mut);}

    /* TEAM DETAIL */
    .td-back{display:flex;align-items:center;gap:8px;cursor:pointer;color:var(--acc);font-size:13px;font-weight:600;margin-bottom:16px;width:fit-content;}
    .td-back:hover{color:#93c5fd;}
    .td-header{display:flex;align-items:center;gap:16px;background:var(--sur);border:1px solid var(--bor);border-radius:14px;padding:18px 20px;margin-bottom:14px;}
    .td-flag{font-size:52px;line-height:1;}
    .td-info{flex:1;}
    .td-name{font-size:24px;font-weight:800;color:var(--text);margin-bottom:4px;}
    .td-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
    .td-badge{font-size:10px;font-weight:700;padding:2px 9px;border-radius:10px;border:1px solid var(--bor);color:var(--dim);}
    .td-formation{background:var(--pur-g);border-color:rgba(168,85,247,.3);color:var(--pur);}
    .td-rank{background:var(--gld-g);border-color:rgba(251,191,36,.3);color:var(--gld);}

    .td-stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(70px,1fr));gap:8px;margin-bottom:14px;}
    .td-stat{background:var(--sur);border:1px solid var(--bor);border-radius:10px;padding:10px 8px;text-align:center;}
    .td-stat .sv{font-size:20px;font-weight:800;color:var(--text);}
    .td-stat .sl{font-size:9px;color:var(--mut);margin-top:2px;text-transform:uppercase;letter-spacing:.05em;}

    .td-section{font-size:10px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.08em;margin:16px 0 8px;display:flex;align-items:center;gap:8px;}
    .td-section::after{content:'';flex:1;height:1px;background:var(--bor);}

    .player-table{width:100%;border-collapse:collapse;font-size:12px;}
    .player-table th{text-align:left;padding:6px 8px;color:var(--mut);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--bor);}
    .player-table th.rc{text-align:right;}
    .player-table td{padding:7px 8px;border-bottom:1px solid rgba(37,48,71,.4);color:var(--text);}
    .player-table td.rc{text-align:right;color:var(--dim);}
    .player-table tr:hover td{background:var(--sur2);}
    .player-table tr:last-child td{border-bottom:none;}
    .pos-badge{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:5px;min-width:22px;text-align:center;}
    .pos-G{background:rgba(251,191,36,.15);color:var(--gld);}
    .pos-D{background:rgba(34,197,94,.12);color:var(--grn);}
    .pos-M{background:rgba(59,130,246,.15);color:var(--acc);}
    .pos-F{background:rgba(239,68,68,.15);color:var(--red);}
    .pos-{background:var(--sur2);color:var(--mut);}
    .goal-num{font-weight:800;color:var(--org);}
    .player-pos-filter{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}

    /* FORMATION + CHARTS */
    .td-viz{display:grid;grid-template-columns:260px 1fr;gap:14px;margin-bottom:14px;align-items:start;}
    @media(max-width:700px){.td-viz{grid-template-columns:1fr;}}
    .td-pitch-wrap{background:var(--sur);border:1px solid var(--bor);border-radius:12px;padding:12px;}
    .td-pitch-label{font-size:10px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;text-align:center;}
    .td-charts-col{display:flex;flex-direction:column;gap:10px;}
    .td-chart{background:var(--sur);border:1px solid var(--bor);border-radius:12px;padding:12px 14px;}
    .td-chart-title{font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
    .funnel-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
    .funnel-label{font-size:11px;color:var(--dim);width:90px;flex-shrink:0;}
    .funnel-track{flex:1;height:10px;background:var(--bor);border-radius:5px;overflow:hidden;}
    .funnel-fill{height:100%;border-radius:5px;transition:width .5s;}
    .funnel-val{font-size:11px;font-weight:700;width:24px;text-align:right;flex-shrink:0;}
    .funnel-pct{font-size:10px;color:var(--mut);width:36px;text-align:right;flex-shrink:0;}
    .scorer-row{display:flex;align-items:center;gap:7px;margin-bottom:6px;}
    .scorer-name{font-size:11px;color:var(--dim);width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0;}
    .scorer-track{flex:1;height:8px;background:var(--bor);border-radius:4px;overflow:hidden;}
    .scorer-fill{height:100%;background:var(--org);border-radius:4px;transition:width .5s;}
    .scorer-val{font-size:11px;font-weight:800;color:var(--org);width:16px;text-align:right;flex-shrink:0;}
    .card-row{display:flex;align-items:center;gap:7px;margin-bottom:6px;}
    .card-name{font-size:11px;color:var(--dim);width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0;}
    .card-chips{display:flex;gap:4px;flex-wrap:wrap;}
    .yc{background:var(--gld-g);color:var(--gld);border:1px solid rgba(251,191,36,.3);border-radius:5px;font-size:9px;font-weight:700;padding:1px 6px;}
    .rc{background:var(--red-g);color:var(--red);border:1px solid rgba(239,68,68,.25);border-radius:5px;font-size:9px;font-weight:700;padding:1px 6px;}

    /* PLAYER TOOLTIP */
    #ptip{position:fixed;z-index:9999;pointer-events:none;opacity:0;transition:opacity .15s;background:var(--sur2);border:1px solid var(--bor);border-radius:12px;padding:12px 14px;box-shadow:0 8px 32px rgba(0,0,0,.5);min-width:160px;max-width:200px;}
    #ptip.show{opacity:1;}
    #ptip .pt-photo{width:72px;height:72px;border-radius:8px;object-fit:cover;background:var(--bor);display:block;margin:0 auto 8px;}
    #ptip .pt-name{font-size:13px;font-weight:700;color:var(--text);text-align:center;margin-bottom:2px;}
    #ptip .pt-pos{font-size:10px;color:var(--mut);text-align:center;margin-bottom:8px;}
    #ptip .pt-stats{display:grid;grid-template-columns:1fr 1fr;gap:4px 8px;}
    #ptip .pt-stat{text-align:center;}
    #ptip .pt-sv{font-size:16px;font-weight:800;}
    #ptip .pt-sl{font-size:9px;color:var(--mut);text-transform:uppercase;letter-spacing:.04em;}
    [data-pid]{cursor:pointer;}

    ::-webkit-scrollbar{width:6px;}
    ::-webkit-scrollbar-track{background:var(--bg);}
    ::-webkit-scrollbar-thumb{background:var(--bor);border-radius:3px;}
    @media(max-width:600px){header{padding:10px 12px;}main{padding:12px 10px;}.tn{font-size:12px;}.pn,.fsn{font-size:22px;}.od{font-size:16px;}}

    /* ── ALGORITHM TAB ── */
    .algo-page{display:flex;flex-direction:column;gap:24px;max-width:900px;margin:0 auto;}
    .algo-section{background:var(--sur);border:1px solid var(--bor);border-radius:14px;padding:20px 22px;}
    .algo-h2{font-size:16px;font-weight:800;color:var(--text);margin:0 0 6px;}
    .algo-sub{font-size:12px;color:var(--dim);margin:0 0 16px;line-height:1.6;}
    .algo-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
    @media(max-width:600px){.algo-cards{grid-template-columns:1fr;}}
    .algo-card{background:var(--sur2);border:1px solid var(--bor);border-radius:12px;padding:16px;border-top-width:3px;}
    .algo-card-pct{font-size:32px;font-weight:900;line-height:1;}
    .algo-card-name{font-size:13px;font-weight:700;color:var(--text);margin:6px 0 4px;}
    .algo-card-desc{font-size:11px;color:var(--dim);line-height:1.5;}

    /* heatmap */
    .algo-heatmap-controls{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
    .algo-select{background:var(--sur2);border:1px solid var(--bor);border-radius:8px;color:var(--text);padding:6px 10px;font-size:12px;cursor:pointer;}
    .heatmap-info{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-bottom:12px;padding:10px 14px;background:var(--sur2);border-radius:10px;}
    .hm-lambda{font-size:12px;color:var(--dim);}
    .hm-lambda b{color:var(--text);}
    .hm-probs{display:flex;gap:16px;font-size:12px;flex-wrap:wrap;}
    .hm-probs b{color:inherit;}
    .heatmap-grid-wrap{overflow-x:auto;position:relative;}
    .heatmap-grid{display:grid;grid-template-columns:24px repeat(8,1fr);gap:2px;min-width:340px;}
    .hm-corner,.hm-col-hdr,.hm-row-hdr{font-size:10px;color:var(--mut);display:flex;align-items:center;justify-content:center;font-weight:700;}
    .hm-col-label{font-size:10px;color:var(--mut);text-align:center;margin-bottom:4px;}
    .hm-row-label{font-size:10px;color:var(--mut);writing-mode:vertical-rl;transform:rotate(180deg);position:absolute;left:-18px;top:50%;transform:translateY(-50%) rotate(180deg);}
    .hm-cell{height:36px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:rgba(255,255,255,.85);transition:transform .1s;}
    .hm-cell:hover{transform:scale(1.12);z-index:2;position:relative;}
    .hm-best{outline:2px solid #fff;outline-offset:-2px;font-weight:900;font-size:10px;}
    .hm-legend{display:flex;gap:16px;font-size:11px;color:var(--dim);margin-top:10px;flex-wrap:wrap;}

    /* math */
    .algo-math-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
    @media(max-width:600px){.algo-math-grid{grid-template-columns:1fr;}}
    .algo-math-block{background:var(--sur2);border:1px solid var(--bor);border-radius:10px;padding:14px;}
    .algo-math-title{font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;}
    .algo-eq{font-family:monospace;font-size:13px;color:var(--text);margin-bottom:6px;line-height:1.5;}
    .algo-eq sub,.algo-eq sup{font-size:9px;}
    .eq-h{color:var(--grn);font-weight:700;}
    .eq-a{color:var(--acc);font-weight:700;}
    .algo-eq-small{font-family:monospace;font-size:10px;color:var(--dim);margin-bottom:4px;line-height:1.6;}
    .algo-eq-note{font-size:10px;color:var(--mut);margin-top:4px;}

    /* strength chart */
    .str-legend{font-size:10px;color:var(--dim);display:flex;gap:16px;margin-bottom:12px;flex-wrap:wrap;}
    .str-row{display:grid;grid-template-columns:90px 1fr 32px;gap:8px;align-items:center;margin-bottom:7px;}
    .str-name{font-size:11px;color:var(--text);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .str-bars{display:flex;flex-direction:column;gap:3px;}
    .str-bar-wrap{display:flex;align-items:center;gap:6px;height:10px;}
    .str-bar{height:8px;border-radius:4px;}
    .str-atk{background:var(--grn);}
    .str-def{background:var(--acc);}
    .str-val{font-size:9px;color:var(--dim);white-space:nowrap;}

    /* elo chart */
    .elo-row{display:grid;grid-template-columns:28px 110px 1fr 46px;gap:8px;align-items:center;margin-bottom:6px;}
    .elo-rank{font-size:10px;color:var(--mut);font-weight:700;text-align:right;}
    .elo-name{font-size:11px;color:var(--text);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .elo-bar-wrap{height:10px;}
    .elo-bar{height:10px;border-radius:5px;transition:width .4s;}
    .elo-val{font-size:10px;color:var(--dim);font-family:monospace;}

    /* data grid */
    .algo-data-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
    @media(max-width:600px){.algo-data-grid{grid-template-columns:repeat(2,1fr);}}
    .algo-data-card{background:var(--sur2);border:1px solid var(--bor);border-radius:10px;padding:14px;text-align:center;}
    .algo-data-num{font-size:28px;font-weight:900;line-height:1;}
    .algo-data-lbl{font-size:12px;font-weight:700;color:var(--text);margin:4px 0 2px;}
    .algo-data-sub{font-size:10px;color:var(--mut);}
  /* ── TAB LOADER ── */
  #tab-loader{
    position:fixed;inset:0;z-index:9999;
    background:rgba(10,12,18,0.82);backdrop-filter:blur(4px);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    opacity:0;pointer-events:none;transition:opacity 0.15s;
  }
  #tab-loader.show{opacity:1;pointer-events:all;}
  .loader-scene{width:260px;height:130px;position:relative;overflow:visible;}
  /* ground line */
  .loader-scene::after{content:'';position:absolute;bottom:18px;left:0;right:0;height:2px;background:rgba(255,255,255,0.12);border-radius:1px;}
  /* ball */
  @keyframes ball-fly{
    0%  {left:36px;bottom:22px;transform:rotate(0deg);}
    40% {left:130px;bottom:82px;transform:rotate(200deg);}
    100%{left:245px;bottom:22px;transform:rotate(400deg);}
  }
  @keyframes ball-bounce{
    0%,100%{transform:scaleY(1);}
    40%{transform:scaleY(0.92);}
  }
  .loader-ball{
    position:absolute;width:26px;height:26px;
    background:radial-gradient(circle at 35% 35%,#fff 0%,#ddd 40%,#aaa 100%);
    border-radius:50%;border:2px solid rgba(0,0,0,0.25);
    animation:ball-fly 0.72s cubic-bezier(0.25,0.46,0.45,0.94) forwards;
  }
  /* player body */
  @keyframes player-kick{
    0%  {transform:rotate(0deg);}
    20% {transform:rotate(-8deg);}
    40% {transform:rotate(4deg);}
    100%{transform:rotate(0deg);}
  }
  .loader-player{position:absolute;left:0;bottom:18px;animation:player-kick 0.72s ease forwards;}
  /* SVG player parts via CSS */
  .loader-player svg{width:52px;height:90px;}
  /* text */
  .loader-text{margin-top:18px;font-size:13px;font-weight:700;letter-spacing:1.5px;color:rgba(255,255,255,0.55);text-transform:uppercase;}
  @keyframes dots{0%,100%{content:''}33%{content:'.'}66%{content:'..'}99%{content:'...'}}
  .loader-text::after{content:'';animation:dots 1s infinite;}
  </style>
</head>
<body>
<div id="tab-loader">
  <div class="loader-scene">
    <div class="loader-player">
      <svg viewBox="0 0 52 90" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- head -->
        <circle cx="26" cy="10" r="8" fill="#f0c080"/>
        <!-- body -->
        <rect x="18" y="20" width="16" height="22" rx="4" fill="#2563eb"/>
        <!-- left arm -->
        <rect x="6" y="22" width="13" height="6" rx="3" fill="#2563eb" transform="rotate(20 6 22)"/>
        <!-- right arm (raised for kick) -->
        <rect x="33" y="18" width="13" height="6" rx="3" fill="#2563eb" transform="rotate(-35 33 18)"/>
        <!-- left leg -->
        <rect x="18" y="40" width="7" height="20" rx="3" fill="#1e3a8a"/>
        <rect x="16" y="58" width="9" height="7" rx="2" fill="#111"/>
        <!-- right leg (kicking) -->
        <rect x="27" y="40" width="7" height="16" rx="3" fill="#1e3a8a" transform="rotate(-40 27 40)"/>
        <rect x="38" y="30" width="9" height="7" rx="2" fill="#111" transform="rotate(-40 38 30)"/>
      </svg>
    </div>
    <div class="loader-ball"></div>
  </div>
  <div class="loader-text">Loading</div>
</div>
<header>
  <div class="hdr-l">
    <button class="hbg" onclick="openSidebar()" aria-label="Scores">☰</button>
    <span style="font-size:26px">🏆</span>
    <div class="ttl">
      <h1>WC 2026 · AI Prediction Engine</h1>
      <p>Dixon-Coles Poisson (55%) · Market Odds (40%) · Bayesian Elo (5%) · xG · Weather · H2H</p>
    </div>
  </div>
  <div class="hdr-r">
    <div class="pill"><div class="dot" id="dot"></div><span id="stxt">Loading…</span></div>
    <span style="font-size:11px;color:var(--mut)">🔄 <span id="cd" style="color:var(--acc);font-weight:600">60</span>s</span>
    <button class="rbtn" id="rbtn" onclick="load(true)"><span class="si">⟳</span> Refresh</button>
  </div>
</header>
<div id="ptip">
  <div id="pt-photo-wrap" style="width:72px;height:72px;border-radius:8px;overflow:hidden;background:var(--bor);margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--mut)">
    <img id="pt-img" style="width:100%;height:100%;object-fit:cover;display:none" src="" alt=""/>
    <span id="pt-initials"></span>
  </div>
  <div class="pt-name" id="pt-name"></div>
  <div class="pt-pos" id="pt-pos"></div>
  <div class="pt-stats" id="pt-stats"></div>
</div>
<div class="layout">
<div class="sb-overlay" id="sb-overlay" onclick="closeSidebar()"></div>
<aside class="sidebar" id="sidebar">
  <button class="sb-close" onclick="closeSidebar()">✕</button>
  <div class="sb-title">🤖 Next 2 Days</div>
  <div id="sb"></div>
</aside>
<main>
  <div class="filters">
    <button class="fb" onclick="setF('all',this)">All Games</button>
    <button class="fb active" onclick="setF('soon',this)">⚡ Next 2 Days</button>
    <button class="fb" onclick="setF('finished',this)">✓ Finished</button>
    <button class="fb" onclick="setF('teams',this)">👥 Teams</button>
    <button class="fb" onclick="setF('algo',this)">📐 Algorithm</button>
    <div class="quota" id="quota" style="display:none"></div>
    <div class="quota" id="odds-fetched-at" style="display:none;color:var(--mut)"></div>
    <div class="quota" id="quota-tip" style="display:none;color:var(--gld);border-color:rgba(251,191,36,0.3)">📅 Odds refresh July 1 — hit Refresh</div>
  </div>
  <div id="gc"><div class="state"><div class="ic">⚽</div><h3>Loading predictions…</h3></div></div>
</main>
</div>

<script>
let games=[], filter='soon', cdVal=60;

function openSidebar(){document.getElementById('sidebar').classList.add('open');document.getElementById('sb-overlay').classList.add('open');document.body.style.overflow='hidden';}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sb-overlay').classList.remove('open');document.body.style.overflow='';}

let teamsData=[], selectedTeam=null, teamRoster=null, playerPosFilter='all';

// ── Player tooltip ──────────────────────────────────────────────────────────
const _tip = document.getElementById('ptip');
let _tipTimer = null;

function showPlayerTip(e, player) {
  clearTimeout(_tipTimer);
  const posMap = {G:'Goalkeeper',D:'Defender',M:'Midfielder',F:'Forward'};
  const isGK = player.position === 'G';
  const img = document.getElementById('pt-img');
  const initials = document.getElementById('pt-initials');
  const name = player.name || player.shortName || '';
  const ini = name.split(' ').map(w=>w[0]).slice(-2).join('').toUpperCase();
  // Reset to initials while photo loads
  img.style.display = 'none';
  img.src = '';
  initials.textContent = ini;
  initials.style.display = '';
  document.getElementById('pt-name').textContent = name;
  // Async photo from TheSportsDB (proxied through our server)
  fetch(`/api/player-photo/${encodeURIComponent(name)}`)
    .then(r => r.json())
    .then(d => {
      if (!d.url) return;
      img.onload = () => { img.style.display = 'block'; initials.style.display = 'none'; };
      img.onerror = () => {};
      img.src = d.url;
    })
    .catch(() => {});
  document.getElementById('pt-pos').textContent = (posMap[player.position] || player.positionName || '—') + (player.jersey ? '  ·  #' + player.jersey : '');
  const stats = isGK
    ? [['Saves', player.saves||0,'var(--grn)'], ['GA', player.goalsConceded||0,'var(--red)'], ['Apps', player.appearances||0,'var(--dim)'], ['YC', player.yellowCards||0,'var(--gld)']]
    : [['Goals', player.goals||0,'var(--org)'], ['Assists', player.assists||0,'var(--acc)'], ['SoT', player.shotsOnTarget||0,'var(--dim)'], ['YC', player.yellowCards||0,'var(--gld)']];
  document.getElementById('pt-stats').innerHTML = stats.map(([l,v,c])=>
    `<div class="pt-stat"><div class="pt-sv" style="color:${c}">${v||'-'}</div><div class="pt-sl">${l}</div></div>`
  ).join('');
  positionTip(e);
  _tip.classList.add('show');
}

function positionTip(e) {
  const pad = 12;
  const tw = _tip.offsetWidth || 200, th = _tip.offsetHeight || 160;
  let x = e.clientX + 14, y = e.clientY - th / 2;
  if (x + tw > window.innerWidth - pad) x = e.clientX - tw - 14;
  if (y < pad) y = pad;
  if (y + th > window.innerHeight - pad) y = window.innerHeight - th - pad;
  _tip.style.left = x + 'px';
  _tip.style.top  = y + 'px';
}

function hideTip() {
  _tipTimer = setTimeout(() => _tip.classList.remove('show'), 120);
}

// Global delegation — works for both SVG nodes and table rows
document.addEventListener('mouseover', e => {
  const el = e.target.closest('[data-pid]');
  if (!el || !teamRoster) return;
  const pid = el.dataset.pid;
  const player = teamRoster.players.find(p => p.id === pid);
  if (player) showPlayerTip(e, player);
});
document.addEventListener('mousemove', e => {
  if (_tip.classList.contains('show')) positionTip(e);
});
document.addEventListener('mouseout', e => {
  if (e.target.closest('[data-pid]')) hideTip();
});

load();
setInterval(()=>{cdVal--;document.getElementById('cd').textContent=cdVal;if(cdVal<=0)load();},1000);

async function load(manual=false){
  const m=manual;
  const btn=document.getElementById('rbtn'); btn.classList.add('spin');
  const dot=document.getElementById('dot'), st=document.getElementById('stxt');
  try{
    // Manual refresh fetches fresh odds (uses API quota). Auto-refresh skips odds (free).
    const url = m ? '/api/odds' : '/api/odds?skipOdds=true';
    console.log('[load]', m ? 'manual — fetching fresh odds' : 'auto — skipping odds API');
    const r=await fetch(url);
    if(!r.ok) throw new Error(`HTTP ${r.status} ${r.statusText}`);
    const j=await r.json();
    console.log('[load] source:', j.source, '| games:', j.games?.length, '| quota:', j.quota);
    games=j.games||[];
    const src=j.source||'';
    dot.className=src==='live'?'dot ok':'dot';
    st.textContent=src==='live'?'Live data':src==='error'?'ESPN data (no odds)':'ESPN data';
    if(j.quota){const q=document.getElementById('quota');q.style.display='block';q.textContent=`API: ${j.quota.used} used · ${j.quota.remaining} left`;}
    const ofa=document.getElementById('odds-fetched-at');
    if(ofa){if(j.oddsFetchedAt){const ago=Math.round((Date.now()-j.oddsFetchedAt)/60000);const agoStr=ago<60?`${ago}m ago`:ago<1440?`${Math.round(ago/60)}h ago`:`${Math.round(ago/1440)}d ago`;ofa.style.display='block';ofa.textContent=`🕐 Odds fetched ${agoStr}`;}else{ofa.style.display='none';}}
    const fetchedEl=document.getElementById('odds-fetched-at');
    if(fetchedEl){
      if(j.oddsFetchedAt){
        const diff=Date.now()-j.oddsFetchedAt;
        const mins=Math.floor(diff/60000),hrs=Math.floor(mins/60);
        const ago=hrs>0?`${hrs}h ${mins%60}m ago`:mins>0?`${mins}m ago`:'just now';
        fetchedEl.textContent=`Odds fetched: ${ago}`;fetchedEl.style.display='block';
      }else{fetchedEl.style.display='none';}
    }
    const tip=document.getElementById('quota-tip');
    const hasOdds=games.some(g=>g.bookmakerCount>0);
    if(tip) tip.style.display=hasOdds?'none':'block';
    render(); renderSidebar(); cdVal=60; document.getElementById('cd').textContent=60;
  }catch(e){
    console.error('[load] failed:', e.message);
    dot.className='dot'; // always reset — don't leave stale green on error
    st.textContent='Error: '+e.message;
  }
  finally{btn.classList.remove('spin');}
}

function renderSidebar(){
  const soon = games.filter(g=>g.status==='soon' && g.prediction);
  const sb = document.getElementById('sb');
  if(!soon.length){sb.innerHTML='<div style="padding:8px 14px;font-size:10px;color:var(--mut)">No predictions</div>';return;}
  sb.innerHTML = soon.map(g=>{
    const p=g.prediction;
    const ph=p.predictedHome, pa=p.predictedAway;
    const hc=ph>pa?'w':ph===pa?'d':'l';
    const ac=pa>ph?'w':pa===ph?'d':'l';
    const cardId=`card-${(g.home+g.away).replace(/[^a-zA-Z]/g,'')}`;
    return `<div class="sb-row" onclick="scrollToCard('${cardId}')">
      <div class="sb-home"><span class="sb-flag">${g.homeFlag||'🏳️'}</span><span class="sb-name">${g.home}</span></div>
      <div class="sb-sc"><span class="sb-num ${hc}">${ph}</span><span class="sb-dash">–</span><span class="sb-num ${ac}">${pa}</span></div>
      <div class="sb-away"><span class="sb-name">${g.away}</span><span class="sb-flag">${g.awayFlag||'🏳️'}</span></div>
    </div>`;
  }).join('');
}

function render(){
  if(filter==='teams'){selectedTeam?renderTeamDetail():renderTeams();return;}
  if(filter==='algo'){renderAlgo();return;}
  const gc=document.getElementById('gc');
  const f=games.filter(g=>filter==='all'||g.status===filter);
  if(!f.length){gc.innerHTML=`<div class="state"><div class="ic">📅</div><h3>No ${filter} games</h3></div>`;return;}
  const grp={live:[],soon:[],upcoming:[],finished:[]};
  f.forEach(g=>(grp[g.status]||grp.upcoming).push(g));
  let html='';
  if(grp.live.length){html+=`<div class="sh">🔴 Live Now</div>`;grp.live.forEach(g=>html+=card(g));}
  if(grp.soon.length){html+=`<div class="sh">⚡ Starting Soon</div>`;grp.soon.forEach(g=>html+=card(g));}
  if(grp.upcoming.length){html+=`<div class="sh">📅 Upcoming — AI Predictions</div>`;grp.upcoming.forEach(g=>html+=card(g));}
  if(grp.finished.length){html+=`<div class="sh">✓ Finished</div>`;grp.finished.forEach(g=>html+=card(g));}
  gc.innerHTML=html;
}

function card(g){
  const p=g.prediction;
  const odds=g.odds||{};
  const ho=odds[g.home]||null, ao=odds[g.away]||null, dr=odds['Draw']||null;
  const allO=[ho,dr,ao].filter(Boolean), minO=Math.min(...allO), maxO=Math.max(...allO);
  const isLive=g.status==='live', isFin=g.status==='finished', isSoon=g.status==='soon';

  // prob bar from odds
  const hp=ho?1/ho:0,dp=dr?1/dr:0,ap=ao?1/ao:0,tot=hp+dp+ap;
  const hPct=tot?Math.round(hp/tot*100):0, dPct=tot?Math.round(dp/tot*100):0, aPct=tot?Math.round(ap/tot*100):0;

  // center
  let center='';
  if(isLive&&g.liveScore!==undefined){
    const[ls,rs]=(g.liveScore||'0 – 0').split(' – ');
    center=`<div class="live-s"><div class="ls">${ls}<span style="font-size:15px;color:var(--mut)">–</span>${rs}</div><div class="lmin">⏱ ${g.liveMinute||'LIVE'}</div></div>`;
  } else if(isFin&&g.homeScore!=null){
    const hs=g.homeScore,as_=g.awayScore;
    const hc=hs>as_?'w':hs<as_?'l':'d', ac=as_>hs?'w':as_<hs?'l':'d';
    center=`<div class="fin-s"><div class="fs"><span class="fsn ${hc}">${hs}</span><span class="fsd">–</span><span class="fsn ${ac}">${as_}</span></div><div class="fin-tag">✓ FINAL</div></div>`;
  } else if(p){
    const ph=p.predictedHome,pa=p.predictedAway;
    const hc=ph>pa?'w':ph<pa?'l':'d', ac=pa>ph?'w':pa<ph?'l':'d';
    center=`<div class="pred"><div class="pred-nums"><span class="pn ${hc}">${ph}</span><span class="pdash">–</span><span class="pn ${ac}">${pa}</span></div><div class="pred-tag">🤖 AI Prediction</div></div>`;
  } else {
    center=`<div class="kt ${isSoon?'soon':''}">${isSoon?'⚡ Soon':fmt(g.commence)}</div>`;
  }

  // factor breakdown
  let factorHTML='';
  if(p && !isFin && !isLive){
    const f=p.factors;
    const lcBadge = p.lowConfidenceMode ? `<span style="background:var(--gld-g);color:var(--gld);border:1px solid rgba(251,191,36,.3);border-radius:8px;padding:1px 7px;font-size:9px;font-weight:700;margin-left:6px">⚡ Deep mode</span>` : '';
    // Poisson model row — shows Dixon-Coles λ values + outcome probs
    const po = f.poisson || {};
    const poissonRow = `<div class="factor-row">
      <span class="factor-name">Poisson model</span>
      <div style="flex:1;display:flex;flex-direction:column;gap:2px">
        <div class="factor-bar"><div class="fbar-h" style="width:${po.homeWin||0}%"></div><div class="fbar-d" style="width:${po.draw||0}%;background:var(--org);opacity:.5"></div><div class="fbar-a" style="width:${po.awayWin||0}%"></div></div>

function frow(name,hv,av,wt,hlbl,albl,text=false){
  if(text) return `<div class="factor-row"><span class="factor-name">${name}</span><div style="flex:1;display:flex;gap:8px;font-size:10px;color:var(--dim)"><span style="color:var(--grn)">${hlbl}</span><span style="color:var(--acc)">${albl}</span></div><span class="fw">${wt}</span></div>`;
  const total=(hv||0)+(av||0)||100;
  const hp=Math.round((hv||0)/total*100), ap=Math.round((av||0)/total*100);
  return `<div class="factor-row">
    <span class="factor-name">${name}</span>
    <div class="factor-bar"><div class="fbar-h" style="width:${hp}%"></div><div class="fbar-a" style="width:${ap}%"></div></div>
    <div class="factor-vals"><span style="color:var(--grn)">${hlbl||hp+'%'}</span><span style="color:var(--acc)">${albl||ap+'%'}</span></div>
    <span class="fw">${wt}</span>
  </div>`;
}

function obox(odds,label,fav,dog,draw=false){
  if(!odds) return `<div class="ob"><div class="oo">${tr(label)}</div><div class="od" style="color:var(--mut)">–</div></div>`;
  const cls=fav?'fav':dog?'dog':'';
  return `<div class="ob ${cls}"><div class="oo">${draw?'Draw':tr(label)}</div><div class="od">${odds.toFixed(2)}</div><div class="oa">${toAm(odds)}</div><div class="oi">${Math.round(100/odds)}% implied</div></div>`;
}

function toAm(d){if(!d||d<=1)return'N/A';return d>=2?`+${Math.round((d-1)*100)}`:`${Math.round(-100/(d-1))}`;}
function tr(s,n=10){return s?.length>n?s.slice(0,n)+'…':s||'?';}
function sn(s){if(!s)return'?';const p=s.split(' ');return p[p.length-1];}
function fmt(iso){if(!iso)return'?';return new Date(iso).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
function fmtDate(iso){if(!iso)return'';const d=new Date(iso);return d.toLocaleDateString([],{month:'short',day:'numeric'});}
function showTabLoader(cb){
  const el = document.getElementById('tab-loader');
  el.classList.add('show');
  // restart ball animation by re-inserting the element
  const ball = el.querySelector('.loader-ball');
  const clone = ball.cloneNode(true);

}

function calcAccuracy() {
  const finished = games.filter(g => g.status === 'finished' && g.prediction && g.homeScore != null && g.awayScore != null);
  if (!finished.length) return null;
  const outcome = (h, a) => h > a ? 'H' : h < a ? 'A' : 'D';
  const maxP = (hw, d, aw) => hw >= d && hw >= aw ? 'H' : aw >= d && aw >= hw ? 'A' : 'D';
  let correct = 0, exact = 0, hCorrect = 0, dCorrect = 0, aCorrect = 0;
  let hActual = 0, dActual = 0, aActual = 0, hPred = 0, dPred = 0, aPred = 0;
  let totalGoals = 0, totalPredGoals = 0;
  const upsets = [];
  finished.forEach(g => {
    const ah = g.homeScore, aa = g.awayScore;
    const p = g.prediction;
    const ph = p.predictedHome, pa = p.predictedAway;
    const hw = p.homeWinProb||0, dw = p.drawProb||0, aw = p.awayWinProb||0;
    const act = outcome(ah, aa), pred = maxP(hw, dw, aw);
    if (act === 'H') hActual++; else if (act === 'D') dActual++; else aActual++;
    if (pred === 'H') hPred++; else if (pred === 'D') dPred++; else aPred++;
    if (act === pred) { correct++; if (act==='H') hCorrect++; else if(act==='D') dCorrect++; else aCorrect++; }
    if (ph === ah && pa === aa) exact++;
    totalGoals += ah + aa;
    totalPredGoals += ph + pa;
    if (act !== pred && ((pred==='H'&&act==='A')||(pred==='A'&&act==='H'))) {
      upsets.push(`${g.homeFlag||''}${g.home} ${ah}–${aa} ${g.away}${g.awayFlag||''}`);
    }
  });
  const n = finished.length;
  return { n, correct, exact, hActual, dActual, aActual, hPred, dPred, aPred,
    hCorrect, dCorrect, aCorrect, upsets,
    avgGoals: (totalGoals/n).toFixed(2), avgPredGoals: (totalPredGoals/n).toFixed(2) };
}

// Client-side Poisson for heatmap
function cpPMF(lambda, k){
  if(k < 0 || lambda <= 0) return k===0 ? 1 : 0;
  let logP = -lambda + k * Math.log(lambda);
  for(let i = 2; i <= k; i++) logP -= Math.log(i);
  return Math.exp(logP);
}
function dcTauClient(i, j, lH, lA, rho=-0.028){
  if(i===0&&j===0) return 1 - lH*lA*rho;
  if(i===1&&j===0) return 1 + lA*rho;
  if(i===0&&j===1) return 1 + lH*rho;
  if(i===1&&j===1) return 1 - rho;
  return 1;
}
function computeHeatmapMatrix(lH, lA){
  const MAX=7, mat=[];
  let maxP=0;
  let mlI=0, mlJ=0;
  for(let i=0;i<=MAX;i++){
    mat[i]=[];
    for(let j=0;j<=MAX;j++){
      const p=Math.max(0, cpPMF(lH,i)*cpPMF(lA,j)*dcTauClient(i,j,lH,lA));
      mat[i][j]=p;
      if(p>maxP){maxP=p;mlI=i;mlJ=j;}
    }
  }
  return {mat, maxP, mlI, mlJ};
}

function buildHeatmapSelectors(d){
  const home = document.getElementById('hm-home');
  const away = document.getElementById('hm-away');
  if(!home||!away) return;
  // Sort by attack desc → top teams first
  const teams = [...d.teamStrengths].sort((a,b)=>a.nn.localeCompare(b.nn));
  const opts = teams.map(t=>`<option value="${t.nn}">${t.nn.replace(/\b\w/g,c=>c.toUpperCase())}</option>`).join('');
  home.innerHTML = opts;
  away.innerHTML = opts;
  // If navigating from a game card, pre-select those teams; otherwise default to top 2
  if(algoOverride) {
    const normStr = s => s.toLowerCase().replace(/[^a-z ]/g,'').replace(/\s+/g,' ').trim();
    const overH = normStr(algoOverride.home), overA = normStr(algoOverride.away);
    for(const o of home.options) if(o.value===overH||o.value.includes(overH.split(' ')[0])){home.value=o.value;break;}
    for(const o of away.options) if(o.value===overA||o.value.includes(overA.split(' ')[0])){away.value=o.value;break;}
  } else if(teams.length>1) {
    away.selectedIndex=1;
  }
  updateHeatmap();
}

async function updateHeatmap(){
  if(!algoData) return;
  const hmHome = document.getElementById('hm-home');
  const hmAway = document.getElementById('hm-away');
  if(!hmHome||!hmAway) return;
  const hn = hmHome.value, an = hmAway.value;

  let lH, lA, finalHome=null, finalDraw=null, finalAway=null, fromCard=false;

  // If we have an override from a game card click and dropdowns still match, use exact predictor λ
  if(algoOverride && algoOverride.lH) {
    const normStr = s => s.toLowerCase().replace(/[^a-z ]/g,'').replace(/\s+/g,' ').trim();
    const overH = normStr(algoOverride.home), overA = normStr(algoOverride.away);
    if(hn===overH || hn.includes(overH.split(' ')[0])) {
      lH = algoOverride.lH; lA = algoOverride.lA;
      finalHome = algoOverride.finalHome; finalDraw = algoOverride.finalDraw; finalAway = algoOverride.finalAway;
      fromCard = true;
    }
  }

  if(!lH) {
    // First: look up from already-loaded games data (exact same prediction as game card)
    const normStr = s => s.toLowerCase().replace(/[^a-z ]/g,'').replace(/\s+/g,' ').trim();
    const matchedGame = games.find(g => {
      const gh = normStr(g.home), ga = normStr(g.away);
      return (gh===hn || gh.includes(hn.split(' ')[0])) && (ga===an || ga.includes(an.split(' ')[0]));
    });
    if(matchedGame?.prediction?.factors?.poisson?.lambdaHome) {
      const p = matchedGame.prediction;
      lH = p.factors.poisson.lambdaHome; lA = p.factors.poisson.lambdaAway;
      finalHome = Math.round(p.homeWinProb * 100);
      finalDraw = Math.round(p.drawProb * 100);
      finalAway = Math.round(p.awayWinProb * 100);
      fromCard = true;
    }
  }

  if(!lH) {
    // Fall back to lambda endpoint (hypothetical matchup or game not loaded)
    try {
      const ld = await fetch(`/api/lambda?home=${encodeURIComponent(hn)}&away=${encodeURIComponent(an)}`).then(r=>r.json());
      lH = ld.lambdaHome; lA = ld.lambdaAway;
      finalHome = Math.round(ld.blendHome * 100);
      finalDraw = Math.round(ld.blendDraw * 100);
      finalAway = Math.round(ld.blendAway * 100);
    } catch(e) {
      const hStr = algoData.teamStrengths.find(t=>t.nn===hn);
      const aStr = algoData.teamStrengths.find(t=>t.nn===an);
      if(!hStr||!aStr) return;
      const L = algoData.leagueAvg;
      lH = Math.max(0.25, Math.min(5, (hStr.attack * aStr.defense) / L * 1.08));
      lA = Math.max(0.25, Math.min(5, (aStr.attack * hStr.defense) / L));
    }
  }

  const {mat, maxP, mlI, mlJ} = computeHeatmapMatrix(lH, lA);

  // Raw Poisson outcome probs (from score matrix)
  let pH=0, pD=0, pA=0;
  for(let i=0;i<=7;i++) for(let j=0;j<=7;j++){
    if(i>j) pH+=mat[i][j]; else if(i<j) pA+=mat[i][j]; else pD+=mat[i][j];
  }
  const tot=(pH+pD+pA)||1;
  pH/=tot; pD/=tot; pA/=tot;

  const hLabel = hn.replace(/\b\w/g,c=>c.toUpperCase());
  const aLabel = an.replace(/\b\w/g,c=>c.toUpperCase());

  // Build prob display: if from card, show both Poisson-only AND final blended
  const poissonProbLine = `<span style="color:var(--grn)">${hLabel}: <b>${Math.round(pH*100)}%</b></span><span style="color:var(--org)">Draw: <b>${Math.round(pD*100)}%</b></span><span style="color:var(--acc)">${aLabel}: <b>${Math.round(pA*100)}%</b></span>`;
  const finalProbLine = finalHome!=null
    ? `<span style="color:var(--grn)">${hLabel}: <b>${finalHome}%</b></span><span style="color:var(--org)">Draw: <b>${finalDraw}%</b></span><span style="color:var(--acc)">${aLabel}: <b>${finalAway}%</b></span>`
    : '';

  // Extra info from card override
  const hmSuspHome = algoOverride?.suspHome || 0;
  const hmSuspAway = algoOverride?.suspAway || 0;
  const hmXgSource = algoOverride?.xgSource || 'proxy';
  const hmExtra = algoOverride?.extraFactors || null;

  let html=`<div class="heatmap-info">
    <div class="hm-lambda">λ<sub>home</sub> = <b>${lH.toFixed(2)}</b> &nbsp;·&nbsp; λ<sub>away</sub> = <b>${lA.toFixed(2)}</b>${fromCard?` <span style="font-size:9px;color:var(--pur);margin-left:6px">exact predictor values</span>`:''}</div>
    ${finalHome!=null ? `
    <div style="width:100%;display:flex;flex-direction:column;gap:4px">
      <div class="hm-probs" style="font-size:10px;color:var(--mut)">Poisson model only: ${poissonProbLine}</div>
      <div class="hm-probs">${fromCard ? 'Final prediction (Poisson + odds + Elo)' : 'Poisson + Elo blend (no market odds)'}: ${finalProbLine}</div>
    </div>` : `<div class="hm-probs">${poissonProbLine}</div>`}
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:4px;font-size:10px;color:var(--dim)">
      <span>xG source: ${hmXgSource==='shots'?'<span style="color:var(--grn)">Shots-based (ESPN)</span>':'<span style="color:var(--mut)">Goals proxy</span>'}</span>
      ${(hmSuspHome>0||hmSuspAway>0)?`<span>${[
        hmSuspHome>0?`<span style="color:var(--red)">🟥 ${hLabel}: ${hmSuspHome} suspended</span>`:'',
        hmSuspAway>0?`<span style="color:var(--red)">🟥 ${aLabel}: ${hmSuspAway} suspended</span>`:'',
      ].filter(Boolean).join(' · ')}</span>`:''}
    </div>
    ${hmExtra ? `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid var(--bor);font-size:10px">
      ${hmExtra.isKnockout ? `<span style="background:rgba(251,191,36,0.15);color:var(--gld);padding:2px 7px;border-radius:12px;border:1px solid rgba(251,191,36,0.3)">🏆 Knockout −6%λ</span>` : '<span style="background:var(--sur2);color:var(--mut);padding:2px 7px;border-radius:12px">Group stage</span>'}
      ${(hmExtra.yellowCards?.home||0)>=4 ? `<span style="background:rgba(234,179,8,0.15);color:#ca8a04;padding:2px 7px;border-radius:12px;border:1px solid rgba(234,179,8,0.3)">🟨 ${hLabel} ${hmExtra.yellowCards.home} yellows −3%λ</span>` : ''}
      ${(hmExtra.yellowCards?.away||0)>=4 ? `<span style="background:rgba(234,179,8,0.15);color:#ca8a04;padding:2px 7px;border-radius:12px;border:1px solid rgba(234,179,8,0.3)">🟨 ${aLabel} ${hmExtra.yellowCards.away} yellows −3%λ</span>` : ''}
      ${(hmExtra.restDays?.home!=null&&hmExtra.restDays.home<5) ? `<span style="background:rgba(251,146,60,0.15);color:var(--org);padding:2px 7px;border-radius:12px;border:1px solid rgba(251,146,60,0.3)">😴 ${hLabel} ${hmExtra.restDays.home}d rest ${hmExtra.restDays.home<4?'−7%':'−4%'}λ</span>` : ''}
      ${(hmExtra.restDays?.away!=null&&hmExtra.restDays.away<5) ? `<span style="background:rgba(251,146,60,0.15);color:var(--org);padding:2px 7px;border-radius:12px;border:1px solid rgba(251,146,60,0.3)">😴 ${aLabel} ${hmExtra.restDays.away}d rest ${hmExtra.restDays.away<4?'−7%':'−4%'}λ</span>` : ''}
      ${(hmExtra.managerStyle?.home!=null&&Math.abs(hmExtra.managerStyle.home)>0.3) ? `<span style="background:var(--sur2);color:${hmExtra.managerStyle.home>0?'var(--grn)':'var(--acc)'};padding:2px 7px;border-radius:12px">${hLabel} style ${hmExtra.managerStyle.home>0?'⚡ attacking':'🛡 defensive'}</span>` : ''}
      ${(hmExtra.managerStyle?.away!=null&&Math.abs(hmExtra.managerStyle.away)>0.3) ? `<span style="background:var(--sur2);color:${hmExtra.managerStyle.away>0?'var(--grn)':'var(--acc)'};padding:2px 7px;border-radius:12px">${aLabel} style ${hmExtra.managerStyle.away>0?'⚡ attacking':'🛡 defensive'}</span>` : ''}
      ${(hmExtra.isKnockout&&hmExtra.penaltyRisk) ? `<span style="background:var(--sur2);color:var(--mut);padding:2px 7px;border-radius:12px">🥅 Penalties: ${hLabel} ${hmExtra.penaltyRisk.home??'?'}% · ${aLabel} ${hmExtra.penaltyRisk.away??'?'}%</span>` : ''}
      ${(hmExtra.attackDefense?.homeGames!=null) ? `<span style="background:var(--sur2);color:var(--dim);padding:2px 7px;border-radius:12px">📊 Data: ${hmExtra.attackDefense.homeGames}/${hmExtra.attackDefense.awayGames} WC games</span>` : ''}
    </div>` : ''}
  </div>
  <div class="heatmap-grid-wrap">
    <div class="hm-col-label">${aLabel} goals →</div>
    <div class="heatmap-grid">
      <div class="hm-corner"></div>
      ${[0,1,2,3,4,5,6,7].map(j=>`<div class="hm-col-hdr">${j}</div>`).join('')}
      ${mat.map((row,i)=>`
        <div class="hm-row-hdr">${i}</div>
        ${row.map((p,j)=>{
          const pct=Math.round(p*100*100)/100;
          const intense=Math.min(1,p/maxP);
          let bg, col='var(--text)';
          const isML = i===mlI&&j===mlJ;
          if(i>j){ bg=`rgba(34,197,94,${0.15+intense*0.75})`; }
          else if(i<j){ bg=`rgba(96,165,250,${0.15+intense*0.75})`; }
          else { bg=`rgba(251,146,60,${0.15+intense*0.75})`; }
          return `<div class="hm-cell${isML?' hm-best':''}" style="background:${bg}">${pct>0.1?pct.toFixed(1)+'%':''}</div>`;
        }).join('')}
      `).join('')}
    </div>
    <div class="hm-row-label">${hLabel} goals ↓</div>
  </div>
  <div class="hm-legend">
    <span style="color:var(--grn)">■ Home win</span>
    <span style="color:var(--org)">■ Draw</span>
    <span style="color:var(--acc)">■ Away win</span>
    <span style="color:var(--mut)">★ Most likely score</span>
  </div>`;

  const wrap = document.getElementById('heatmap-wrap');
  if(wrap) wrap.innerHTML = html;
}

function buildStrengthChart(d){
  const el = document.getElementById('strength-chart');
  if(!el) return;
  // Top 24 teams by attack, sorted
  const teams = d.teamStrengths.slice(0,24);
  const maxVal = Math.max(...teams.flatMap(t=>[t.attack,t.defense]));

  const rows = teams.map(t => {
    const atkW = Math.round((t.attack / maxVal) * 100);
    const defW = Math.round((t.defense / maxVal) * 100);
    const name = t.nn.replace(/\b\w/g,c=>c.toUpperCase()).substring(0,12);
    const gameTxt = t.games>0?`<span style="color:var(--pur);font-size:9px">${t.games}g</span>`:`<span style="color:var(--mut);font-size:9px">prior</span>`;
    return `<div class="str-row">
      <div class="str-name">${name}</div>
      <div class="str-bars">
        <div class="str-bar-wrap" title="Attack: ${t.attack.toFixed(2)} xG/game">
          <div class="str-bar str-atk" style="width:${atkW}%"></div>
          <span class="str-val" style="color:var(--grn)">${t.attack.toFixed(2)}</span>
        </div>
        <div class="str-bar-wrap" title="Defense: ${t.defense.toFixed(2)} xG conceded/game">
          <div class="str-bar str-def" style="width:${defW}%"></div>
          <span class="str-val" style="color:var(--acc)">${t.defense.toFixed(2)}</span>
        </div>
      </div>
      ${gameTxt}
    </div>`;
  }).join('');

  el.innerHTML = `<div class="str-legend">

function buildEloChart(d){
  const el = document.getElementById('elo-chart');
  if(!el) return;
  const top = d.eloRatings.slice(0,30);
  const minElo = Math.min(...top.map(t=>t.elo));
  const maxElo = Math.max(...top.map(t=>t.elo));
  const range = maxElo - minElo || 1;

  const rows = top.map((t,i) => {
    const w = Math.round(((t.elo - minElo) / range) * 80 + 20);
    const col = i<5?'var(--grn)':i<10?'var(--org)':'var(--acc)';
    const name = (t.name||t.nn).replace(/\b\w/g,c=>c.toUpperCase()).substring(0,16);
    return `<div class="elo-row">
      <div class="elo-rank">${i+1}</div>
      <div class="elo-name">${name}</div>
      <div class="elo-bar-wrap"><div class="elo-bar" style="width:${w}%;background:${col}"></div></div>
      <div class="elo-val">${t.elo}</div>
    </div>`;
  }).join('');

  el.innerHTML = rows;
}
